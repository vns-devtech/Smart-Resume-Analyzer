<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        Smart Resume Analyzer
        {% endblock %}
    </title>

    <!-- Google Font -->

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">

    <!-- Font Awesome -->

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    {% block css %}

    {% endblock %}

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

    <div class="logo">

        <i class="fa-solid fa-rocket"></i>

        <span>

            Smart Resume Analyzer

        </span>

    </div>

    <ul>

        <li>

            <a href="/">

                Home

            </a>

        </li>

        <li>

            <a href="#features">

                Features

            </a>

        </li>

        <li>

            <a href="#about">

                About

            </a>

        </li>

        <li>

            <a href="https://github.com/yourusername/Smart-Resume-Analyzer"
               target="_blank">

                GitHub

            </a>

        </li>

    </ul>

</nav>

<!-- ================= MAIN ================= -->

{% block content %}

{% endblock %}

<!-- ================= FOOTER ================= -->

<footer>

    <p>

        © 2026 Smart Resume Analyzer

    </p>

</footer>

{% block scripts %}

{% endblock %}

</body>

</html>
